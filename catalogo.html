<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Urban RKT">
    <title>Urban RKT | Catalogo completo</title>
    <link rel="manifest" href="site.webmanifest">
    <link rel="apple-touch-icon" href="assets/app-icon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="catalog-page scrolled">

    <header class="site-header catalog-header">
        <a class="brand" href="index.html#inicio">URBAN RKT</a>
        <nav class="main-nav" aria-label="Navegacion principal">
            <a class="nav-link" href="index.html#inicio">Inicio</a>
            <div class="nav-item has-dropdown">
                <a class="nav-link" href="catalogo.html">Productos</a>
                <div class="dropdown-menu">
                    <a href="index.html#destacados">Productos destacados</a>
                    <a href="catalogo.html">Productos</a>
                    <button type="button" data-categoria="todo">Todo</button>
                    <button type="button" data-categoria="conjuntos">Conjuntos</button>
                    <button type="button" data-categoria="buzos">Buzos</button>
                    <button type="button" data-categoria="joggings">Joggings</button>
                </div>
            </div>
            <a class="nav-link" href="catalogo.html?categoria=conjuntos">Blacktop</a>
            <a class="nav-link" href="index.html#destacados">Blog</a>
            <a class="nav-link" href="index.html#categorias">Cultura</a>
            <a class="nav-link" href="https://wa.me/549221XXXXXXX" target="_blank" rel="noopener">Contactanos</a>
        </nav>
        <form class="header-search" action="catalogo.html">
            <input type="search" name="q" placeholder="Buscar productos..." aria-label="Buscar productos">
        </form>
    </header>

    <main class="catalog-shell catalog-page-shell" id="catalogo">
        <aside class="filters-panel" aria-label="Filtros">
            <select id="orden-productos" class="sort-select" aria-label="Ordenar productos">
                <option value="relevantes">Mas relevantes</option>
                <option value="menor-precio">Menor precio</option>
                <option value="mayor-precio">Mayor precio</option>
                <option value="nombre">Nombre</option>
            </select>

            <label class="switch-row">
                <span>Retiro por sucursal</span>
                <input type="checkbox">
                <i></i>
            </label>

            <label class="switch-row">
                <span>Envio a domicilio</span>
                <input type="checkbox" checked>
                <i></i>
            </label>

            <button class="filter-accordion active" data-categoria="todo">Categoria de producto</button>
            <button class="filter-accordion" data-categoria="conjuntos">Conjuntos</button>
            <button class="filter-accordion" data-categoria="buzos">Buzos / Camperas</button>
            <button class="filter-accordion" data-categoria="joggings">Joggings / Pantalones</button>
            <button class="filter-accordion">Talle</button>
            <button class="filter-accordion">Precio</button>
            <button class="filter-accordion">Color</button>
        </aside>

        <section class="catalog-content">
            <div class="catalog-toolbar">
                <h1>Catalogo completo</h1>
                <p><strong id="contador-productos">0</strong> resultados</p>
            </div>

            <div id="loading" class="skeleton-grid"></div>
            <div class="productos-grid" id="grid-productos"></div>
            <div class="load-more-wrap">
                <button type="button" id="btn-ver-mas">Ver mas</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
