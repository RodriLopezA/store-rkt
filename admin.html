<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Urban RKT">
    <title>Panel de Control</title>
    <link rel="manifest" href="site.webmanifest">
    <link rel="apple-touch-icon" href="assets/app-icon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-admin">

    <section class="admin-container" id="login-admin">
        <h1>ACCESO ADMIN</h1>
        <p class="sub-admin">Inicia sesion para administrar el catalogo</p>

        <form id="form-login">
            <div class="grupo-input">
                <label>EMAIL</label>
                <input type="email" id="login-email" placeholder="admin@tutienda.com" required>
            </div>

            <div class="grupo-input">
                <label>CONTRASENA</label>
                <input type="password" id="login-password" placeholder="Tu contrasena" required>
            </div>

            <button type="submit" id="btn-login">INGRESAR</button>
        </form>
    </section>

    <section class="admin-container admin-panel" id="panel-admin" hidden>
        <div class="admin-panel-head">
            <div>
                <h1>PANEL DE CARGA</h1>
                <p class="sub-admin">Subi ropa al catalogo en tiempo real</p>
            </div>
            <button type="button" id="btn-logout">SALIR</button>
        </div>

        <div class="admin-metricas" id="admin-metricas">
            <article>
                <span>Prendas activas</span>
                <strong id="metrica-activas">0</strong>
            </article>
            <article>
                <span>Categoria fuerte</span>
                <strong id="metrica-categoria">-</strong>
            </article>
            <article>
                <span>Ultimas remeras</span>
                <strong id="metrica-remeras">0</strong>
                <small id="metrica-remeras-lista">Sin remeras recientes</small>
            </article>
        </div>
        
        <form id="form-panel">
            <div class="grupo-input">
                <label>NOMBRE DE LA PRENDA</label>
                <input type="text" id="nombre" placeholder="Ej: Buzo Nike Deportiva" required>
            </div>

            <div class="grupo-input">
                <label>PRECIO ($)</label>
                <input type="number" id="precio" placeholder="Ej: 32000" required>
                <small class="precio-preview" id="precio-preview">$ 0</small>
            </div>

            <div class="grupo-input">
                <label>CATEGORIA</label>
                <select id="categoria">
                    <option value="conjuntos">CONJUNTOS</option>
                    <option value="buzos">BUZOS / CAMPERAS</option>
                    <option value="joggings">JOGGINGS / PANTALONES</option>
                    <option value="remeras">REMERAS</option>
                </select>
            </div>

            <div class="grupo-input">
                <label>TALLES DISPONIBLES</label>
                <input type="hidden" id="talles" value="XS, S, M, L, XL" required>
                <div class="talles-selector" id="talles-selector" aria-label="Seleccionar talles disponibles">
                    <button type="button" class="selected" data-talle="XS">XS</button>
                    <button type="button" class="selected" data-talle="S">S</button>
                    <button type="button" class="selected" data-talle="M">M</button>
                    <button type="button" class="selected" data-talle="L">L</button>
                    <button type="button" class="selected" data-talle="XL">XL</button>
                    <button type="button" data-talle="XXL">XXL</button>
                    <button type="button" data-talle="U">U</button>
                    <button type="button" data-talle="38">38</button>
                    <button type="button" data-talle="40">40</button>
                    <button type="button" data-talle="42">42</button>
                    <button type="button" data-talle="44">44</button>
                </div>
                <small class="input-ayuda" id="talles-preview">Seleccionados: XS, S, M, L, XL</small>
            </div>

            <div class="grupo-input">
                <label>COLORES O DETALLES (Separados por coma)</label>
                <input type="text" id="colores" placeholder="Ej: Negro, Gris, Bordado blanco">
            </div>

            <div class="grupo-input">
                <label>FOTOS DE LA PRENDA (Hasta 3: frente, dorso, detalle)</label>
                <input type="file" id="foto" accept="image/*" multiple required>
                <small class="input-ayuda">Toca para sacar una foto o elegir de la fototeca.</small>
                <div class="preview-fotos" id="preview-fotos"></div>
            </div>

            <button type="submit" id="btn-publicar">PUBLICAR EN LA WEB</button>
        </form>

        <div class="admin-listado">
            <div class="admin-listado-head">
                <h2>PRODUCTOS CARGADOS</h2>
                <button type="button" id="btn-recargar-productos">RECARGAR</button>
            </div>
            <div id="admin-productos" class="admin-productos">
            </div>
        </div>
    </section>

    <script src="admin.js"></script>
</body>
</html>
